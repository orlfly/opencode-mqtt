services:
  opencode-mqtt:
    image: opencode-mqtt:latest
    container_name: opencode-mqtt
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      - OPENCODE_BASE_URL=http://opencode:4096
    volumes:
      - ./workspace:/opt/workspace
    depends_on:
      opencode:
        condition: service_healthy
    networks:
      - opencode-net

  opencode:
    image: ghcr.io/anomalyco/opencode:latest
    container_name: opencode
    restart: unless-stopped
    command: serve --hostname 0.0.0.0 --port 4096 --log-level INFO --print-logs
    working_dir: /opt/workspace
    env_file:
      - ../.env
    volumes:
      - ./workspace:/opt/workspace
      - ./config:/root/.config/opencode
    healthcheck:
      test: ["CMD", "wget", "-q", "-O-", "http://127.0.0.1:4096/global/health"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s
    networks:
      - opencode-net

networks:
  opencode-net:
    driver: bridge
